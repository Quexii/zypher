name: Build & Release

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'
        cache: 'gradle'

    - name: Make gradlew executable
      if: runner.os != 'Windows'
      run: chmod +x gradlew

    - name: Build with Gradle
      shell: bash
      run: ./gradlew build --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

    - name: Rename Artifact
      shell: bash
      run: |
        mkdir -p dist
        cp build/libs/GlideClient-Release.jar dist/GlideClient-${{ matrix.os }}.jar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GlideClient-${{ matrix.os }}
        path: dist/GlideClient-${{ matrix.os }}.jar
        if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GlideClient-ubuntu-latest/GlideClient-ubuntu-latest.jar
            artifacts/GlideClient-windows-latest/GlideClient-windows-latest.jar
            artifacts/GlideClient-macos-latest/GlideClient-macos-latest.jar
          generate_release_notes: true
          draft: false
          prerelease: false